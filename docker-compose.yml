services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gym-postgres
    environment:
      POSTGRES_DB: gym_app
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
    ports:
      - "5432:5432"
    volumes:
      - gym_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym -d gym_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gym-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override: use postgres host when running inside container (not localhost)
      DATABASE_URL: postgresql://gym:gym@postgres:5432/gym_app?schema=public
    ports:
      - "3001:3001"
    command: sh -c "npm run build -w @gym/api && npm run db:generate -w apps/api && npm run db:migrate:deploy -w apps/api && npm run start:prod -w apps/api"

volumes:
  gym_pg_data:
