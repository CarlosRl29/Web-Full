# Railway / Nixpacks config for monorepo (API or Web)
# Set DEPLOY_TARGET=web for Web service; otherwise builds API
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npm run build:shared",
  "if [ \"$DEPLOY_TARGET\" = \"web\" ]; then npm run build:web; else npm run db:generate -w @gym/api && npm run build:api; fi"
]

[start]
cmd = "if [ \"$DEPLOY_TARGET\" = \"web\" ]; then npm run start:web; else npm run deploy:api; fi"
